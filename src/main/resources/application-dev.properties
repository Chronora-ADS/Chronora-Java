# Dev profile logging
logging.level.br.com.senai=DEBUG
logging.level.br.com.senai.controller=DEBUG
logging.level.br.com.senai.service=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=INFO

# Dev JPA
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Local dev database fallback
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:chronora;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# Helpful while developing locally
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
app.seed.enabled=true
