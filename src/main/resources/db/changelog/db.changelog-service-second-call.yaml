databaseChangeLog:
  - changeSet:
      id: 0017-add-verification-code-call-count-to-service
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - not:
            columnExists:
              tableName: service
              columnName: verification_code_call_count
      changes:
        - addColumn:
            tableName: service
            columns:
              - column:
                  name: verification_code_call_count
                  type: INTEGER
                  defaultValueNumeric: 0
  - changeSet:
      id: 0018-add-service-cancellation-justification-to-service
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - not:
            columnExists:
              tableName: service
              columnName: service_cancellation_justification
      changes:
        - addColumn:
            tableName: service
            columns:
              - column:
                  name: service_cancellation_justification
                  type: VARCHAR(1000)
  - changeSet:
      id: 0019-add-service-cancellation-requester-to-service
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - not:
            columnExists:
              tableName: service
              columnName: service_cancellation_requested_by_user_id
      changes:
        - addColumn:
            tableName: service
            columns:
              - column:
                  name: service_cancellation_requested_by_user_id
                  type: BIGINT
  - changeSet:
      id: 0022-add-service-cancellation-counterparty-to-service
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - not:
            columnExists:
              tableName: service
              columnName: service_cancellation_counterparty_user_id
      changes:
        - addColumn:
            tableName: service
            columns:
              - column:
                  name: service_cancellation_counterparty_user_id
                  type: BIGINT
  - changeSet:
      id: 0023-add-details-to-notification
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - not:
            columnExists:
              tableName: notification
              columnName: detail
      changes:
        - addColumn:
            tableName: notification
            columns:
              - column:
                  name: notification_type
                  type: VARCHAR(80)
              - column:
                  name: detail
                  type: VARCHAR(1000)
              - column:
                  name: actor_name
                  type: VARCHAR(255)
              - column:
                  name: actor_role
                  type: VARCHAR(50)
