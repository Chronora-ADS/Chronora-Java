databaseChangeLog:
  - changeSet:
      id: 0015-create-uptime-check
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - not:
            tableExists:
              tableName: uptime_check
      changes:
        - createTable:
            tableName: uptime_check
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: uptime_check_pkey
                    nullable: false
              - column:
                  name: checked_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: status_code
                  type: INTEGER
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: response_time_ms
                  type: BIGINT
              - column:
                  name: error_message
                  type: VARCHAR(1000)
        - createIndex:
            tableName: uptime_check
            indexName: idx_uptime_check_checked_at
            columns:
              - column:
                  name: checked_at
