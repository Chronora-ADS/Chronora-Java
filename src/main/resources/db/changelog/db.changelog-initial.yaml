            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(255)

  - changeSet:
      id: 0009-fk-user-roles-user
      author: cadug
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - not:
            foreignKeyConstraintExists:
              foreignKeyName: fk6fql8djp64yp4q9b3qeyhr82b
      changes:
        - addForeignKeyConstraint:
            baseTableName: user_roles
            baseColumnNames: user_id
            referencedTableName: app_user
            referencedColumnNames: id
            constraintName: fk6fql8djp64yp4q9b3qeyhr82b

  - changeSet:
      id: 0010-fk-service-user-creator
      author: cadug
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - not:
            foreignKeyConstraintExists:
