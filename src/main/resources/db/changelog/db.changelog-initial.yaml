databaseChangeLog:
  - changeSet:
      id: 0001-create-service
      author: cadug
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - not:
            tableExists:
              tableName: service
      changes:
        - createTable:
            tableName: service
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: service_pkey
                    nullable: false
              - column:
                  name: deadline
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(2500)
                  constraints:
                    nullable: false
              - column:
                  name: modality
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: posted_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: service_image_url
                  type: VARCHAR(500)
              - column:
                  name: status
                  type: SMALLINT
                  constraints:
                    nullable: false
              - column:
                  name: time_chronos
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: user_accepted_id
                  type: BIGINT
              - column:
                  name: user_creator_id
                  type: BIGINT
                  constraints:
                    nullable: false

  - changeSet:
      id: 0002-create-app-user
      author: cadug
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - not:
            tableExists:
              tableName: app_user
      changes:
        - createTable:
            tableName: app_user
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: app_user_pkey
                    nullable: false
              - column:
                  name: document_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: document_type
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: document_url
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: phone_number
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: supabase_user_id
                  type: VARCHAR(255)
              - column:
                  name: time_chronos
                  type: INTEGER
                  constraints:
                    nullable: false

  - changeSet:
      id: 0003-unique-app-user-email
      author: cadug
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - not:
            uniqueConstraintExists:
              tableName: app_user
              constraintName: uk1j9d9a06i600gd43uu3km82jw
      changes:
        - addUniqueConstraint:
            tableName: app_user
            columnNames: email
            constraintName: uk1j9d9a06i600gd43uu3km82jw

  - changeSet:
      id: 0004-unique-app-user-supabase-id
      author: cadug
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - not:
            uniqueConstraintExists:
              tableName: app_user
              constraintName: ukdcsldswbexnkyd0ft7nywanjw
      changes:
        - addUniqueConstraint:
            tableName: app_user
            columnNames: supabase_user_id
            constraintName: ukdcsldswbexnkyd0ft7nywanjw

  - changeSet:
      id: 0005-unique-app-user-phone
      author: cadug
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - not:
            uniqueConstraintExists:
