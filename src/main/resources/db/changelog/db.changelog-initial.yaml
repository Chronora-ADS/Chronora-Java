      changes:
        - addUniqueConstraint:
            tableName: app_user
            columnNames: phone_number
            constraintName: uksgg0yjxgl80p392p9ygv0yk4n

  - changeSet:
      id: 0006-create-notification
      author: cadug
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - not:
            tableExists:
              tableName: notification
      changes:
        - createTable:
            tableName: notification
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: notification_pkey
                    nullable: false
              - column:
                  name: message
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: notification_time
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: service_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

  - changeSet:
      id: 0007-create-service-category-join
      author: cadug
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - not:
            tableExists:
              tableName: service_entity_category_entities
      changes:
        - createTable:
            tableName: service_entity_category_entities
            columns:
              - column:
                  name: service_entity_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: category_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

  - changeSet:
