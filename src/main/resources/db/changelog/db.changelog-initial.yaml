  - changeSet:
      id: 0014-fk-service-category-service
      author: cadug
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - not:
            foreignKeyConstraintExists:
              foreignKeyName: fks9fp0bfljm46lhhwsk06kip1y
      changes:
        - addForeignKeyConstraint:
            baseTableName: service_entity_category_entities
            baseColumnNames: service_entity_id
            referencedTableName: service
