name: Backend CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE: ci-service-role
      SUPABASE_STORAGE_BUCKET: service-images
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/postgres?sslmode=disable
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      APP_SEED_ENABLED: false
      PORT: 8085

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Dar permissao ao mvnw
        run: chmod +x mvnw

      - name: Rodar testes
        run: ./mvnw test

      - name: Gerar build
        run: ./mvnw clean package -DskipTests
